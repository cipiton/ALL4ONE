[llm]
provider = openrouter
model = xiaomi/mimo-v2-pro
base_url = https://openrouter.ai/api/v1
timeout = 60
max_retries = 3

[model_aliases]
; fast = openai/gpt-5-mini
; strong = openai/gpt-5.1

fast = qwen/qwen3.5-flash-02-23
strong = qwen/qwen3.5-plus-02-15

[model_routing]
step_execution_model = fast
final_deliverable_model = strong
qa_final_polish_model = strong
project_chunk_ingestion_model = fast
project_master_outline_model = fast

[generation]
novel_to_drama_script_default_episodes_per_file = 5
novel_to_drama_script_max_episodes_per_file = 10

[project_ingestion]
safe_single_pass_tokens = 200000
auto_split_chunk_chars = 200000
auto_split_overlap_chars = 1000

[outputs]
write_state_json = 0
write_prompt_dump = 0
write_debug_log = 0

[debug]
troubleshooting_mode = 0
auto_accept_review_steps = 1
