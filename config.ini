[llm]
provider = openrouter
model = z-ai/glm-5
base_url = https://openrouter.ai/api/v1
timeout = 60
max_retries = 3

[model_aliases]
fast = openai/gpt-5.4-mini
strong = openai/gpt-5.4
qwen = qwen/3-32b
gemini = google/gemini-2.5-flash

[model_routing]
step_execution_model = fast
final_deliverable_model = strong
qa_final_polish_model = strong
project_chunk_ingestion_model = fast
project_master_outline_model = fast

[generation]
novel_to_drama_script_default_episodes_per_file = 5
novel_to_drama_script_max_episodes_per_file = 10
final_prompt_language = en

[flux_generation]
# CLI/runtime width and height override these values. Leave a value blank to use the built-in fallback for that dimension.
character_plain_white_background = 1
prop_plain_white_background = 1
asset_width =
asset_height =
character_width = 512
character_height = 768
prop_width = 512
prop_height = 512
scene_width = 768
scene_height = 512
environment_width = 768
environment_height = 512
vehicle_width = 512
vehicle_height = 512
wardrobe_width = 512
wardrobe_height = 512
state_variant_width = 512
state_variant_height = 512
keyscene_width = 864
keyscene_height = 1080

[skills]
visible_skill_ids = cp-production, recap_to_tts, flux-asset-and-scene-generation, ltx-video-skill
hidden_skill_ids =

[project_ingestion]
safe_single_pass_tokens = 200000
auto_split_chunk_chars = 200000
auto_split_overlap_chars = 1000

[outputs]
write_state_json = 0
write_prompt_dump = 0
write_debug_log = 0

[debug]
troubleshooting_mode = 0
auto_accept_review_steps = 1

[gui]
workspace_root = C:\Users\CP\Documents\ONE4ALL_Workspace
last_project_name = test1
default_skill_id = story_creation
default_output_path = C:\Users\CP\Documents\ONE4ALL_Workspace\novel test\outputs
language = en
show_internal_project_files = 0

